version: '3.8'

services:
  mrdpstock:
    build: .
    container_name: mrdpstock
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Persistance de la base de données SQLite
      - mrdpstock_data:/app/server/data
    environment:
      NODE_ENV: production
      PORT: 3001
      # ⚠️ CHANGEZ CETTE CLÉ AVANT LE DÉPLOIEMENT !
      # Générez : node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      JWT_SECRET: ${JWT_SECRET:-CHANGEZ_CETTE_CLE_EN_PRODUCTION}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      DB_PATH: /app/server/data/mrdpstock.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Limites de ressources (optionnel, ajustez selon votre VPS)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─── Nginx reverse proxy (recommandé en production avec HTTPS) ────────────
  nginx:
    image: nginx:alpine
    container_name: mrdpstock_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Pour HTTPS avec Let's Encrypt :
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - mrdpstock
    profiles:
      - with-nginx  # Activez avec : docker-compose --profile with-nginx up

volumes:
  mrdpstock_data:
    driver: local
    # Optionnel : pointez vers un dossier host pour backup facile
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /opt/mrdpstock/data
